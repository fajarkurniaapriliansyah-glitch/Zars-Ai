<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zars AI - Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 600px; background: #1e1e1e; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .header { padding: 20px; background: #2c2c2c; border-bottom: 1px solid #333; text-align: center; font-size: 1.2rem; font-weight: bold; color: #00ffcc; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 10px 15px; border-radius: 10px; font-size: 0.9rem; line-height: 1.4; max-width: 85%; word-wrap: break-word; }
        .ai-msg { background: #333; align-self: flex-start; border-bottom-left-radius: 2px; color: #e0e0e0; }
        .user-msg { background: #00ffcc; color: #121212; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #2c2c2c; }
        input { flex: 1; padding: 12px; border: none; border-radius: 5px; background: #3d3d3d; color: white; outline: none; }
        button { background: #00ffcc; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00cca3; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Zars AI</div>
    <div class="chat-box" id="chatBox">
        <div class="msg ai-msg">Halo! Saya <b>Zars AI</b>. Ada yang bisa saya bantu?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Tanya sesuatu..." autocomplete="off">
        <button onclick="askZars()">Kirim</button>
    </div>
</div>

<script>
    // Fitur kirim pesan dengan tombol Enter
    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") { askZars(); }
    });

    async function askZars() {
        const input = document.getElementById('userInput');
        const userText = input.value.trim();

        if (!userText) return;

        // 1. Tampilkan pesan user
        addMessage(userText, 'user-msg');
        input.value = '';

        // 2. Tampilkan status loading
        const loadingDiv = addMessage('Zars sedang berpikir...', 'ai-msg');

        try {
            // 3. Panggil API
            const response = await panggilZarsAI(userText);
            loadingDiv.innerHTML = response; 
        } catch (error) {
            loadingDiv.innerText = "Maaf, Zars mengalami gangguan koneksi atau API Key salah.";
            console.error(error);
        }
    }

    function addMessage(text, className) {
        const chatBox = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg ' + className;
        div.innerHTML = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    async function panggilZarsAI(pesanUser) {
        // Ganti API_KEY ini dengan API Key Google Gemini kamu (yang berawalan AIza...)
        const API_KEY = "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";
        
        // URL yang benar untuk Google Gemini
        const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const response = await fetch(URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: pesanUser }] }]
            })
        });

        const data = await response.json();
        
        // Mengambil teks jawaban dari respon API Gemini
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            return data.candidates[0].content.parts[0].text;
        } else {
            return "Zars tidak bisa menjawab itu sekarang.";
        }
    }
</script>

</body>
</html>
